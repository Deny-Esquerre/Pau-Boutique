<!-- Products Component -->
<section class="products" id="productos">
  <div class="container">
    <div class="section-header">
      <span class="section-header__line"></span>
      <h2 class="section-header__title">Destacados</h2>
      <span class="section-header__line"></span>
    </div>

    <div class="products__filters">
      <button class="filter-btn active" data-filter="all">Todos</button>
      <button class="filter-btn" data-filter="vestidos">Vestidos</button>
      <button class="filter-btn" data-filter="abrigos">Abrigos</button>
      <button class="filter-btn" data-filter="accesorios">Accesorios</button>
    </div>

    <div class="products__grid" id="products-grid">
      <!-- Products injected by JS -->
    </div>

    <div class="products__cta">
      <a href="#" class="btn btn--primary">Ver Todos los Productos</a>
    </div>
  </div>
</section>
