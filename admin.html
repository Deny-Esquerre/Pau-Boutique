<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | PAU Boutique</title>
  
  <!-- Preload Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/main.css">
  <style>
    :root {
      --admin-bg: #f8f9fa;
      --admin-card-bg: #ffffff;
    }
    
    body.admin-body {
      background-color: var(--admin-bg);
      font-family: var(--font-sans);
      color: var(--color-black);
      padding-top: var(--header-height);
    }

    .admin-container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 var(--space-md);
    }

    /* Login Form */
    .login-box {
      max-width: 400px;
      margin: 100px auto;
      background: var(--admin-card-bg);
      padding: var(--space-lg);
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border-radius: 4px;
      text-align: center;
    }

    .login-box h2 {
      font-family: var(--font-serif);
      margin-bottom: var(--space-md);
    }

    .form-group {
      margin-bottom: var(--space-md);
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .form-control {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--color-beige);
      font-family: var(--font-sans);
      outline: none;
    }

    /* Dashboard */
    .dashboard-section {
      display: none; /* Hidden by default */
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-lg);
      padding-bottom: var(--space-sm);
      border-bottom: 1px solid var(--color-beige);
    }

    .admin-card {
      background: var(--admin-card-bg);
      padding: var(--space-md);
      box-shadow: 0 5px 20px rgba(0,0,0,0.03);
      border-radius: 4px;
      margin-bottom: var(--space-md);
    }

    .product-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-md);
    }

    .upload-area {
      border: 2px dashed var(--color-beige);
      padding: var(--space-md);
      text-align: center;
      cursor: pointer;
      transition: background 0.3s;
    }

    .upload-area:hover {
      background: var(--color-warm-white);
    }

    /* Product Table */
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: var(--space-md);
    }

    .admin-table th {
      text-align: left;
      padding: 12px;
      background: var(--color-warm-white);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .admin-table td {
      padding: 12px;
      border-bottom: 1px solid var(--color-beige);
      font-size: 0.9rem;
    }

    .btn-delete {
      color: #d9534f;
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
    }

    #loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.8);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      display: none;
    }
  </style>
</head>
<body class="admin-body">

  <div id="loading-overlay">Cargando...</div>

  <!-- Main Header (Reused for consistent navigation) -->
  <header class="header">
    <div class="container header__container">
      <a href="index.html" class="header__logo">
        <img src="images/logo/logo.png" alt="PAU Boutique" class="header__logo-img" style="height: 50px;">
      </a>
      <div id="auth-status" style="font-size: 0.8rem; letter-spacing: 0.1em;">
        <!-- Filled by JS -->
      </div>
    </div>
  </header>

  <div class="admin-container">
    
    <!-- Login Form -->
    <div id="login-section" class="login-box">
      <h2>Acceso Administrativo</h2>
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="login-password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn--primary" style="width: 100%;">Ingresar</button>
        <p style="margin-top: 20px; font-size: 0.75rem; color: var(--color-gray);">
          ¿No tienes cuenta? <a href="#" id="temp-register" style="text-decoration: underline;">Regístrate aquí (Solo inicial)</a>
        </p>
      </form>
    </div>

    <!-- Dashboard -->
    <div id="dashboard-section" class="dashboard-section">
      <div class="admin-header">
        <h1>Gestión de Productos</h1>
        <div>
          <button id="migrate-btn" class="btn" style="background: #eee; border: 1px solid #ccc; padding: 8px 15px; margin-right: 10px; font-size: 0.7rem;">Migrar Datos Iniciales</button>
          <button id="logout-btn" class="btn btn--primary" style="padding: 8px 20px;">Cerrar Sesión</button>
        </div>
      </div>

      <div class="admin-card">
        <h3>Añadir Nuevo Producto</h3>
        <form id="product-form">
          <div class="product-form-grid">
            <div class="form-group">
              <label>Nombre del Producto</label>
              <input type="text" id="p-name" class="form-control" required>
            </div>
            <div class="form-group">
              <label>Precio</label>
              <input type="number" id="p-price" class="form-control" step="0.01" required>
            </div>
          </div>
          <div class="form-group">
            <label>Descripción</label>
            <textarea id="p-desc" class="form-control" rows="3" required></textarea>
          </div>
          <div class="product-form-grid">
            <div class="form-group">
              <label>Categoría</label>
              <select id="p-category" class="form-control">
                <option value="vestidos">Vestidos</option>
                <option value="abrigos">Abrigos</option>
                <option value="accesorios">Accesorios</option>
              </select>
            </div>
            <div class="form-group">
              <label>Etiqueta (Opcional)</label>
              <input type="text" id="p-badge" class="form-control" placeholder="Ej: Nuevo, Sale">
            </div>
          </div>

          <div class="form-group">
            <label>Imagen del Producto</label>
            <div id="upload-widget" class="upload-area">
              <p>Haz clic para subir imagen (Cloudinary)</p>
              <input type="hidden" id="p-image-url">
              <div id="image-preview" style="margin-top: 10px; display: none;">
                <img src="" alt="Preview" style="max-height: 100px;">
              </div>
            </div>
          </div>

          <button type="submit" class="btn btn--primary" style="width: 100%; margin-top: 20px;">Guardar Producto</button>
        </form>
      </div>

      <div class="admin-card">
        <h3>Productos en Inventario</h3>
        <div style="overflow-x: auto;">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Imagen</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="inventory-list">
              <!-- Filled by JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Cloudinary Upload Widget Script -->
  <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
  
  <!-- Admin JS -->
  <script type="module" src="js/admin.js"></script>
</body>
</html>
